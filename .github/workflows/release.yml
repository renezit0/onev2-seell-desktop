name: Release oneV2 seeLL (Windows)

on:
  push:
    tags:
      - 'onev2-seell-v*'

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync app version from tag
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -notmatch '^onev2-seell-v(\d+\.\d+\.\d+)$') {
            throw "Tag invalida: $tag"
          }
          $version = $Matches[1]
          Write-Host "Setting package.json version to $version"
          npm version $version --no-git-tag-version --allow-same-version

      - name: Build + Publish (NSIS)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run release:win

      - name: Ensure GitHub Release for tag
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh release view "${{ github.ref_name }}" || gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --notes "Release ${{ github.ref_name }}"

      - name: Upload installer assets to current tag release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" release/onev2-seell-desktop-SETUP.exe release/latest.yml release/*.blockmap --clobber
